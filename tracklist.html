<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="김경한을 표현하는 다섯 곡을 소개하는 Play My Vibe 트랙 목록 페이지">
  <title>Track List | Play My Vibe</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
  >
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/main.js"></script>
</head>

<body data-page="tracklist" class="overflow-x-hidden bg-canvas font-sans text-ink antialiased">
  <app-sidebar class="contents" current-page="tracklist"></app-sidebar>

  <div
    data-page-shell
    class="min-h-screen transition-[padding-left] duration-300 ease-in-out lg:pl-72"
  >
    <svg aria-hidden="true" class="absolute size-0 overflow-hidden" data-icon-sprite="">
    <symbol id="icon-play" viewbox="0 0 24 24">
    <path d="M8 5.5v13l10-6.5L8 5.5Z" fill="currentColor"></path>
    </symbol>
    <symbol id="icon-pause" viewbox="0 0 24 24">
    <path d="M7 5h4v14H7zM13 5h4v14h-4z" fill="currentColor"></path>
    </symbol>
    <symbol id="icon-chevron-down" viewbox="0 0 24 24">
    <path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
    </symbol>
    <symbol id="icon-previous" viewbox="0 0 24 24">
    <path d="M6 5v14M18 6.5 9 12l9 5.5v-11Z" fill="currentColor"></path>
    </symbol>
    <symbol id="icon-next" viewbox="0 0 24 24">
    <path d="M18 5v14M6 6.5 15 12l-9 5.5v-11Z" fill="currentColor"></path>
    </symbol>
    <symbol id="icon-arrow-up" viewbox="0 0 24 24">
    <path d="m6 11 6-6 6 6M12 5v14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
    </symbol>
    <symbol id="icon-send" viewbox="0 0 24 24">
    <path d="m21 3-8.5 18-3.2-7.3L2 10.5 21 3Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8"></path>
    <path d="m9.3 13.7 4.6-4.6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"></path>
    </symbol>
    <symbol id="icon-close" viewbox="0 0 24 24">
    <path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
    </symbol>
    <symbol id="icon-disc" viewbox="0 0 24 24">
    <circle cx="12" cy="12" fill="none" r="9" stroke="currentColor" stroke-width="1.7"></circle>
    <circle cx="12" cy="12" fill="none" r="3" stroke="currentColor" stroke-width="1.7"></circle>
    <circle cx="12" cy="12" fill="currentColor" r="0.8"></circle>
    </symbol>
    <symbol id="icon-heart" viewbox="0 0 24 24">
    <path d="M20.8 5.8a5.3 5.3 0 0 0-7.5 0L12 7.1l-1.3-1.3a5.3 5.3 0 1 0-7.5 7.5L12 22l8.8-8.7a5.3 5.3 0 0 0 0-7.5Z" fill="currentColor"></path>
    </symbol>
    </svg>

    <main>
      <section class="relative flex min-h-screen items-center overflow-hidden px-[clamp(1rem,4vw,2rem)] py-[clamp(5rem,9vw,7.5rem)] max-sm:min-h-0 max-sm:py-20 min-h-[100svh]" id="track-list">
      <div aria-hidden="true" class="animate-blob-float pointer-events-none absolute top-8 left-[6%] size-80 rounded-full bg-brand/[0.06] blur-[90px]"></div>
      <div aria-hidden="true" class="animate-pulse-soft pointer-events-none absolute right-[8%] bottom-8 size-[25rem] rounded-full bg-brand-light/[0.05] blur-[90px]"></div>
      <div aria-hidden="true" class="track-list-pattern pointer-events-none absolute inset-0 opacity-[0.03]"></div>
      <div aria-hidden="true" class="absolute top-1/3 -right-20 grid aspect-square w-96 place-items-center rounded-full border-2 border-brand/[0.05] max-sm:hidden">
      <span class="grid aspect-square w-64 place-items-center rounded-full border border-brand/[0.05]">
      <span class="aspect-square w-32 rounded-full border border-brand/[0.05]"></span>
      </span>
      </div>
      <div class="relative z-[2] mx-auto w-full max-w-5xl">
      <header class="mb-[clamp(2.5rem,5vw,3.5rem)] text-center">
      <p class="m-0 text-xs font-extrabold tracking-[0.14em] text-brand uppercase">Tracklist</p>
      <h2 class="mt-[0.3rem] mb-0 text-[clamp(2rem,5vw,2.6rem)] font-[850] tracking-[-0.035em]">나를 표현하는 다섯 곡</h2>
      <p class="mx-auto mt-3 mb-0 max-w-[38rem] text-[clamp(0.9rem,2vw,1rem)] text-muted">각 트랙을 선택하면 Now Playing 페이지에서 해당 곡에 담긴 경험과 이야기를 확인할 수 있습니다.</p>
      </header>
      <div class="relative overflow-hidden rounded-[2.5rem] border border-white/65 bg-white/65 p-[clamp(1.25rem,4vw,2.5rem)] shadow-[0_1rem_2.5rem_rgba(20,40,160,0.07)] backdrop-blur-2xl before:absolute before:top-0 before:left-0 before:size-12 before:rounded-full before:bg-white/25 before:blur-lg before:content-[''] max-sm:rounded-[1.6rem]">
      <div aria-hidden="true" class="mb-4 hidden grid-cols-[3rem_4rem_minmax(0,1fr)_10rem] items-center border-b border-brand/10 px-6 pb-4 text-[0.72rem] font-extrabold tracking-[0.08em] text-muted uppercase md:grid">
      <span class="text-center">#</span>
      <span>커버</span>
      <span>곡 정보</span>
      <span class="text-right">나의 Vibe</span>
      </div>
      <div aria-label="트랙 목록" class="grid gap-3.5" id="tracks-container"></div>
      </div>
      </div>
      </section>
    </main>
  </div>
</body>
</html>
